      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="description" content="XFlex Trading Academy — أكاديمية التداول العربية | Structured Arabic-language trading education." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="XFlex Trading Academy" />
    <meta property="og:title" content="XFlex Trading Academy" />
    <meta property="og:description" content="تعلّم التداول بطريقة مرتبة، بدعم فعلي ونتائج ملموسة." />
    <meta property="og:image" content="/xflex-logo.png" />
    <meta property="og:url" content="https://xflexacademy.com/" />
    <link rel="canonical" href="https://xflexacademy.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XFlex Trading Academy" />
    <meta name="twitter:description" content="تعلّم التداول بطريقة مرتبة، بدعم فعلي ونتائج ملموسة." />
    <meta name="twitter:image" content="/xflex-logo.png" />
    <meta name="theme-color" content="#0D172A" />
    <title>%VITE_APP_TITLE%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Set lang/dir early to prevent browser auto-translate triggering on Arabic content
      (function() {
        try {
          var lang = localStorage.getItem('language');
          if (lang === 'en') {
            document.documentElement.lang = 'en';
            document.documentElement.dir = 'ltr';
          } else {
            document.documentElement.lang = 'ar';
            document.documentElement.dir = 'rtl';
          }
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
