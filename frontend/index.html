<!doctype html>
<html lang="en" class="notranslate" translate="no">

  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/jpeg" href="https://videos.xflexwithai.com/media/images/logo.jpg" />
    <link rel="apple-touch-icon" href="https://videos.xflexwithai.com/media/images/logo.jpg" />
    <title>%VITE_APP_TITLE%</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Set lang/dir early to prevent browser auto-translate triggering on Arabic content
      (function() {
        try {
          var lang = localStorage.getItem('language');
          if (lang === 'ar') {
            document.documentElement.lang = 'ar';
            document.documentElement.dir = 'rtl';
          }
        } catch(e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
